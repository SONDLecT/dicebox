# Mirrors what the Cloudflare worker does at the edge, so a self-hosted copy
# behaves the same way.
#
# Every location includes security-headers.conf rather than relying on a
# server-level add_header: nginx drops inherited headers in any block that
# declares its own, so setting Cache-Control in a location would silently strip
# the entire security policy from those responses.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # A stale service worker pins every other asset to its old version, so it and
  # the shell it installs must always be revalidated.
  location = /sw.js {
    include /etc/nginx/conf.d/security-headers.conf;
    add_header Cache-Control "no-cache" always;
  }

  location = /manifest.webmanifest {
    include /etc/nginx/conf.d/security-headers.conf;
    add_header Cache-Control "no-cache" always;
    default_type application/manifest+json;
  }

  location /icons/ {
    include /etc/nginx/conf.d/security-headers.conf;
    add_header Cache-Control "public, max-age=604800" always;
  }

  # Every navigation resolves to the shell; the app has no server-side routes.
  location / {
    include /etc/nginx/conf.d/security-headers.conf;
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ /index.html;
  }
}
