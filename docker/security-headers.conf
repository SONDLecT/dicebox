# Included into every location block. nginx does not inherit add_header into a
# block that declares its own, so a location setting Cache-Control would
# otherwise silently drop the whole security policy — which is exactly what
# happened to the app shell.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "no-referrer" always;
